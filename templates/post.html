<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ post.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161b24; --border: #252d3d;
      --accent: #4fffb0; --text: #e8edf5; --muted: #6b7a99;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Mulish', sans-serif; font-weight: 300; min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; height: 64px; background: rgba(13,15,20,.9); }
    .logo { font-family: 'Unbounded', sans-serif; font-size: .85rem; color: var(--accent); text-decoration: none; }
    .back { margin-left: auto; color: var(--muted); text-decoration: none; font-size: .85rem; transition: color .2s; }
    .back:hover { color: var(--text); }
    main { max-width: 680px; margin: 4rem auto; padding: 0 2rem; }
    .meta { font-size: .75rem; color: var(--muted); margin-bottom: 1.4rem; letter-spacing: .06em; }
    h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); line-height: 1.2; margin-bottom: 2rem; }
    .body { font-size: 1rem; line-height: 1.8; color: #c8d2e6; }
    footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); font-size: .75rem; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">MY_SITE</a>
  <a class="back" href="/">← Назад</a>
</header>
<main>
  <div class="meta">{{ post.date }}</div>
  <h1>{{ post.title }}</h1>
  <div class="body">{{ post.body }}</div>
  <footer>Запись #{{ post.id }}</footer>
</main>
</body>
</html>
